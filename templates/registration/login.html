<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Login — PrintBuddy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: #1a1d27; border: 1px solid #2e3150; border-radius: 10px; padding: 2.5rem; width: 100%; max-width: 380px; }
    .brand { text-align: center; font-size: 1.4rem; font-weight: 700; color: #a78bfa; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .85rem; color: #8892aa; margin-bottom: .35rem; }
    input { width: 100%; background: #22263a; color: #e2e8f0; border: 1px solid #2e3150; border-radius: 6px; padding: .6rem .75rem; font-size: .875rem; }
    input:focus { outline: 2px solid #6c63ff; outline-offset: 1px; border-color: transparent; }
    button { width: 100%; background: #6c63ff; color: #fff; border: none; border-radius: 6px; padding: .65rem; font-size: .9rem; font-weight: 600; cursor: pointer; margin-top: .5rem; }
    button:hover { opacity: .9; }
    .error { background: #7f1d1d; border: 1px solid #ef4444; color: #fecaca; padding: .6rem .75rem; border-radius: 6px; font-size: .85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">🎨 PrintBuddy Studio</div>

    {% if form.errors %}
    <div class="error">Ungültige Zugangsdaten. Bitte erneut versuchen.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label for="id_username">Benutzername</label>
        <input type="text" id="id_username" name="username" autofocus autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="id_password">Passwort</label>
        <input type="password" id="id_password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Anmelden</button>
    </form>
  </div>
</body>
</html>
