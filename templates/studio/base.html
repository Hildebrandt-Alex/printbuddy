<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Studio{% endblock %} — PrintBuddy</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2uH8mU2hWIiTuoXFbGE7HNPaOxHb2dEZZJ" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3150;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #e2e8f0;
      --text-muted:#8892aa;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --blue:      #3b82f6;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: var(--accent2); text-decoration: none; }
    nav a { color: var(--text-muted); text-decoration: none; font-size: .9rem; padding: .25rem .5rem; border-radius: 4px; }
    nav a:hover, nav a.active { color: var(--text); background: var(--surface2); }
    nav .spacer { flex: 1; }
    nav .user { font-size: .85rem; color: var(--text-muted); }

    /* MAIN */
    main { flex: 1; padding: 2rem 1.5rem; max-width: 1200px; margin: 0 auto; width: 100%; }

    /* MESSAGES */
    .messages { list-style: none; margin-bottom: 1.5rem; }
    .messages li {
      padding: .75rem 1rem;
      border-radius: 6px;
      margin-bottom: .5rem;
      font-size: .9rem;
    }
    .messages .success { background: #14532d; border: 1px solid var(--green); color: #bbf7d0; }
    .messages .error   { background: #7f1d1d; border: 1px solid var(--red);   color: #fecaca; }
    .messages .warning { background: #78350f; border: 1px solid var(--yellow); color: #fde68a; }
    .messages .info    { background: #1e3a5f; border: 1px solid var(--blue);  color: #bfdbfe; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--accent2); }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .5rem 1rem; border-radius: 6px; font-size: .875rem;
      font-weight: 500; cursor: pointer; border: none; text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm { padding: .3rem .7rem; font-size: .8rem; }

    /* BADGES */
    .badge {
      display: inline-block; padding: .2rem .55rem; border-radius: 9999px;
      font-size: .75rem; font-weight: 600;
    }
    .badge-draft    { background: #334155; color: #94a3b8; }
    .badge-queued   { background: #1e3a5f; color: #93c5fd; }
    .badge-running  { background: #3b1e6d; color: #c4b5fd; }
    .badge-done     { background: #14532d; color: #86efac; }
    .badge-failed   { background: #7f1d1d; color: #fca5a5; }
    .badge-cancelled { background: #292524; color: #a8a29e; }
    .badge-pending  { background: #292524; color: #a8a29e; }
    .badge-skipped  { background: #334155; color: #94a3b8; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { text-align: left; padding: .6rem .75rem; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: .6rem .75rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* FORM */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .85rem; color: var(--text-muted); margin-bottom: .35rem; }
    input[type=text], input[type=number], input[type=password],
    select, textarea {
      width: 100%; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: .55rem .75rem; font-size: .875rem; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent;
    }
    textarea { resize: vertical; min-height: 80px; }
    .form-hint { font-size: .78rem; color: var(--text-muted); margin-top: .25rem; }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    @media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

    /* STAT-BOX */
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; }
    .stat-box .value { font-size: 2rem; font-weight: 700; }
    .stat-box .label { font-size: .8rem; color: var(--text-muted); margin-top: .15rem; }

    /* PAGE HEADER */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; }

    /* SPINNER */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HTMX indicator */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="{% url 'studio:dashboard' %}" class="brand">🎨 PrintBuddy Studio</a>
    <a href="{% url 'studio:dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="{% url 'studio:job_list' %}" {% if request.resolver_match.url_name in 'job_list,job_detail,job_results' %}class="active"{% endif %}>Jobs</a>
    <a href="{% url 'studio:wizard_step1' %}" {% if 'wizard' in request.resolver_match.url_name %}class="active"{% endif %} style="background:var(--accent);color:#fff;padding:.3rem .8rem;border-radius:6px">+ Erstellen</a>
    <a href="{% url 'studio:prompt_library' %}" {% if request.resolver_match.url_name == 'prompt_library' %}class="active"{% endif %}>Prompts</a>
    <span class="spacer"></span>
    <span class="user">{{ request.user.username }}</span>
    <a href="/studio/logout/">Logout</a>
  </nav>

  <main>
    {% if messages %}
    <ul class="messages">
      {% for msg in messages %}
      <li class="{{ msg.tags }}">{{ msg }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
