# PrintBuddy — Nginx vhost
# Datei auf VPS: /etc/nginx/sites-available/printbuddy
# Aktivieren: sudo ln -s /etc/nginx/sites-available/printbuddy /etc/nginx/sites-enabled/printbuddy

upstream printbuddy {
    server 127.0.0.1:8001;
}

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name datemyhobby.com www.datemyhobby.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name datemyhobdy.com www.datemyhobby.com;

    # TLS — certbot füllt diese Pfade automatisch aus
    ssl_certificate     /etc/letsencrypt/live/datemyhobby.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datemyhobby.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static Files — direkt von Nginx, kein Django
    location /static/ {
        alias /opt/printbuddy/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media Files — vom NAS
    location /media/ {
        alias /mnt/agency_nas/;
        expires 7d;
    }

    # Django App
    location / {
        proxy_pass http://printbuddy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 10;
    }

    # Stripe Webhook — kein Timeout-Problem
    location /shop/webhook/stripe/ {
        proxy_pass http://printbuddy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }
}
